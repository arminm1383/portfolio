<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Armin Mohammadi — Product Designer</title>
    <!-- GitHub Pages SPA: redirect 404s back to index, preserving the path -->
    <script>
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
